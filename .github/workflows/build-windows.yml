name: Build Windows x64 App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js 18
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install pnpm
      run: npm install -g pnpm

    - name: Install dependencies
      run: pnpm install

    # 直接打包根目录的 index.ts → 这是你真正的入口！
    - name: Build EXE
      run: npx pkg index.ts --output quick-login-app --targets node18-win-x64
      env:
        CASDOOR_SERVER_URL: ${{ secrets.CASDOOR_SERVER_URL }}
        CASDOOR_CLIENT_ID: ${{ secrets.CASDOOR_CLIENT_ID }}
        ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: quick-login-app-win-x64
        path: quick-login-app-win-x64.exe
