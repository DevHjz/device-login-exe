name: Build Windows App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x64, arm64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      # 直接调用 pkg，不经过 scripts！彻底避开冲突
      - name: Build Windows ${{ matrix.arch }}
        run: |
          pkg . --output quick-login-app --targets node18-win-${{ matrix.arch }}
        env:
          CASDOOR_SERVER_URL: ${{ secrets.CASDOOR_SERVER_URL }}
          CASDOOR_CLIENT_ID: ${{ secrets.CASDOOR_CLIENT_ID }}
          ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: quick-login-app-win-${{ matrix.arch }}
          path: "quick-login-app-win-${{ matrix.arch }}.exe"
